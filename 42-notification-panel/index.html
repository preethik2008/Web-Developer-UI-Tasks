<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notification Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="panel">

<div class="header">

<h2>🔔 Notifications</h2>

<span class="badge">4</span>

</div>

<div class="notification">

<div>

<h4>New Message</h4>

<p>You received a new message from Emma.</p>

</div>

<button class="close">&times;</button>

</div>

<div class="notification">

<div>

<h4>Order Confirmed</h4>

<p>Your recent order has been confirmed.</p>

</div>

<button class="close">&times;</button>

</div>

<div class="notification">

<div>

<h4>Meeting Reminder</h4>

<p>Your meeting starts in 30 minutes.</p>

</div>

<button class="close">&times;</button>

</div>

<div class="notification">

<div>

<h4>System Update</h4>

<p>Your application was updated successfully.</p>

</div>

<button class="close">&times;</button>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
