<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brown Social</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

<h2>BrownSocial</h2>

<nav>

<a href="#">Home</a>
<a href="#">Friends</a>
<a href="#">Messages</a>
<a href="#">Profile</a>

</nav>

</header>

<div class="container">

<section class="stories">

<div class="story">
<img src="https://randomuser.me/api/portraits/women/65.jpg">
<p>Emma</p>
</div>

<div class="story">
<img src="https://randomuser.me/api/portraits/men/32.jpg">
<p>David</p>
</div>

<div class="story">
<img src="https://randomuser.me/api/portraits/women/44.jpg">
<p>Sophia</p>
</div>

<div class="story">
<img src="https://randomuser.me/api/portraits/men/18.jpg">
<p>Alex</p>
</div>

</section>

<section class="create-post">

<textarea placeholder="What's on your mind?"></textarea>

<button>Post</button>

</section>

<section class="feed">

<div class="post">

<div class="user">

<img src="https://randomuser.me/api/portraits/women/50.jpg">

<div>

<h3>Sarah Johnson</h3>

<p>2 hours ago</p>

</div>

</div>

<p>Enjoying a beautiful sunset after work! 🌅</p>

<img class="post-img" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=900&auto=format&fit=crop">

<div class="actions">

<button>👍 Like</button>

<button>💬 Comment</button>

<button>📤 Share</button>

</div>

</div>

<div class="post">

<div class="user">

<img src="https://randomuser.me/api/portraits/men/55.jpg">

<div>

<h3>Michael Brown</h3>

<p>5 hours ago</p>

</div>

</div>

<p>Weekend hiking adventure! 🏞️</p>

<img class="post-img" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=900&auto=format&fit=crop">

<div class="actions">

<button>👍 Like</button>

<button>💬 Comment</button>

<button>📤 Share</button>

</div>

</div>

</section>

</div>

<script src="js/app.js"></script>

</body>
</html>
