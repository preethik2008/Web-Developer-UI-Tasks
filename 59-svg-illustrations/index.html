<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVG Illustrations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>SVG Illustration</h1>

<svg class="illustration" viewBox="0 0 500 300">

<!-- Sun -->
<circle cx="420" cy="70" r="35" fill="#FFD54F"/>

<!-- Clouds -->
<ellipse cx="120" cy="70" rx="45" ry="22" fill="#ffffff"/>
<ellipse cx="155" cy="65" rx="35" ry="18" fill="#ffffff"/>

<!-- Mountains -->
<polygon points="50,250 170,100 290,250" fill="#8D6E63"/>
<polygon points="200,250 340,80 470,250" fill="#6D4C41"/>

<!-- Ground -->
<rect x="0" y="250" width="500" height="50" fill="#81C784"/>

<!-- Tree -->
<rect x="95" y="180" width="15" height="70" fill="#795548"/>
<circle cx="102" cy="165" r="28" fill="#43A047"/>

</svg>

<p>Simple SVG landscape created using HTML.</p>

</div>

<script src="js/app.js"></script>

</body>
</html>
