<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Flow Wireframe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>User Flow Wireframe</h1>

<div class="flow">

<div class="box">
<div class="icon">🔐</div>
<h2>Login</h2>
<p>User signs in</p>
</div>

<div class="arrow">➜</div>

<div class="box">
<div class="icon">🏠</div>
<h2>Dashboard</h2>
<p>Select a course</p>
</div>

<div class="arrow">➜</div>

<div class="box">
<div class="icon">📚</div>
<h2>Course</h2>
<p>Complete lessons</p>
</div>

<div class="arrow">➜</div>

<div class="box">
<div class="icon">🏆</div>
<h2>Certificate</h2>
<p>Download certificate</p>
</div>

</div>

<button id="demoBtn">
View User Journey
</button>

</div>

<script src="js/app.js"></script>

</body>

</html>
