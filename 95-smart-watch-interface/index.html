<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Watch Interface</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="watch">

<div class="screen">

<div class="time" id="time">
10:30
</div>

<div class="date" id="date">
Monday, July 5
</div>

<div class="heart">

❤️

<h2 id="heartRate">
76 BPM
</h2>

</div>

<div class="stats">

<div class="card">
🚶
<p>8,420</p>
<span>Steps</span>
</div>

<div class="card">
🔥
<p>520</p>
<span>Calories</span>
</div>

</div>

<button id="refreshBtn">
Refresh
</button>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
