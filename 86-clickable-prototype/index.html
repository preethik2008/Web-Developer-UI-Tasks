<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clickable Prototype</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="phone">

<!-- Screen 1 -->
<div id="home" class="screen active">

<h1>Learning App</h1>

<img src="https://images.pexels.com/photos/1181359/pexels-photo-1181359.jpeg?auto=compress&cs=tinysrgb&w=800"
alt="Learning">

<p>Learn web development through interactive lessons.</p>

<button id="startBtn">Start Learning</button>

</div>

<!-- Screen 2 -->
<div id="course" class="screen">

<h2>Frontend Development</h2>

<div class="lesson">
HTML & CSS Basics
</div>

<div class="lesson">
JavaScript Essentials
</div>

<div class="lesson">
Responsive Web Design
</div>

<button id="completeBtn">
Complete Course
</button>

</div>

<!-- Screen 3 -->
<div id="success" class="screen">

<div class="icon">🎉</div>

<h2>Congratulations!</h2>

<p>You completed your first course successfully.</p>

<button id="restartBtn">
Back to Home
</button>

</div>

</div>

<script src="js/app.js"></script>

</body>

</html>
