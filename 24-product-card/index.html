<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Card</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1 class="title">Featured Products</h1>

<div class="products">

<div class="card">

<div class="badge">20% OFF</div>

<img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?w=600&auto=format&fit=crop" alt="Leather Backpack" class="image">

<h2>Leather Backpack</h2>

<p class="rating">⭐⭐⭐⭐⭐ (4.8)</p>

<p class="price">
<span class="old">₹4,999</span>
<span class="new">₹3,999</span>
</p>

<div class="buttons">
<button class="cart">Add to Cart</button>
<button class="buy">Buy Now</button>
</div>

</div>

<div class="card">

<div class="badge">15% OFF</div>

<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&auto=format&fit=crop" alt="Watch" class="image">

<h2>Classic Watch</h2>

<p class="rating">⭐⭐⭐⭐☆ (4.6)</p>

<p class="price">
<span class="old">₹5,499</span>
<span class="new">₹4,699</span>
</p>

<div class="buttons">
<button class="cart">Add to Cart</button>
<button class="buy">Buy Now</button>
</div>

</div>

<div class="card">

<div class="badge">30% OFF</div>

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&auto=format&fit=crop" alt="Running Shoes" class="image">

<h2>Running Shoes</h2>

<p class="rating">⭐⭐⭐⭐⭐ (4.9)</p>

<p class="price">
<span class="old">₹3,999</span>
<span class="new">₹2,799</span>
</p>

<div class="buttons">
<button class="cart">Add to Cart</button>
<button class="buy">Buy Now</button>
</div>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
