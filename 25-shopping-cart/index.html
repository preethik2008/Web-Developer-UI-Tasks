<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

<h2>BrownStore</h2>

</header>

<div class="container">

<div class="cart">

<h1>Shopping Cart</h1>

<div class="item">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&auto=format&fit=crop" alt="Shoes">

<div>

<h3>Running Shoes</h3>

<p>₹2,799</p>

</div>

<input type="number" value="1" min="1">

</div>

<div class="item">

<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&auto=format&fit=crop" alt="Watch">

<div>

<h3>Classic Watch</h3>

<p>₹4,699</p>

</div>

<input type="number" value="1" min="1">

</div>

</div>

<div class="summary">

<h2>Order Summary</h2>

<p>Subtotal <span>₹7,498</span></p>

<p>Shipping <span>₹100</span></p>

<p class="total">Total <span>₹7,598</span></p>

<button>Proceed to Checkout</button>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
