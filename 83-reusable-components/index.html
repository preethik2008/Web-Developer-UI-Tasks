<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reusable Components</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>Reusable Components</h1>

<section>

<h2>Buttons</h2>

<button class="btn primary">Primary</button>
<button class="btn secondary">Secondary</button>

</section>

<section>

<h2>Cards</h2>

<div class="card">

<img src="https://images.pexels.com/photos/1184572/pexels-photo-1184572.jpeg?auto=compress&cs=tinysrgb&w=600"
alt="Education">

<h3>Web Development</h3>

<p>
Learn HTML, CSS and JavaScript by building real-world projects.
</p>

<button class="btn primary">Read More</button>

</div>

</section>

<section>

<h2>Profile Card</h2>

<div class="profile">

<img src="https://api.dicebear.com/9.x/adventurer/svg?seed=Preethi"
alt="Avatar">

<h3>Preethi K</h3>

<p>Frontend Developer</p>

</div>

</section>

<section>

<h2>Alert Box</h2>

<div class="alert">
✔️ Your project has been saved successfully.
</div>

</section>

<section>

<h2>Input Field</h2>

<input type="text" placeholder="Enter your name">

</section>

</div>

<script src="js/app.js"></script>

</body>

</html>
