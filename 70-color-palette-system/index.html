<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Palette System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Color Palette System</h1>

<p class="subtitle">
A simple UI color system for modern web applications.
</p>

<div class="palette">

<div class="color primary">
<h3>Primary</h3>
<span>#2563EB</span>
</div>

<div class="color secondary">
<h3>Secondary</h3>
<span>#7C3AED</span>
</div>

<div class="color accent">
<h3>Accent</h3>
<span>#F59E0B</span>
</div>

<div class="color success">
<h3>Success</h3>
<span>#22C55E</span>
</div>

<div class="color danger">
<h3>Error</h3>
<span>#EF4444</span>
</div>

<div class="color dark">
<h3>Dark</h3>
<span>#1F2937</span>
</div>

<div class="color light">
<h3>Light</h3>
<span>#F3F4F6</span>
</div>

<div class="color info">
<h3>Info</h3>
<span>#06B6D4</span>
</div>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
