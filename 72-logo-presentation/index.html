<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Presentation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>Logo Presentation</h1>

        <div class="logo-card">

            <div class="logo">
                WD
            </div>

            <h2>WebDev Studio</h2>

            <p>
                A modern and minimal logo representing creativity,
                innovation, and clean web design.
            </p>

        </div>

        <h3>Logo Variations</h3>

        <div class="variations">

            <div class="variation brown">WD</div>

            <div class="variation dark">WD</div>

            <div class="variation light">WD</div>

        </div>

        <div class="mockup">

            <img src="https://images.pexels.com/photos/3184465/pexels-photo-3184465.jpeg?auto=compress&cs=tinysrgb&w=900"
                alt="Office">

        </div>

        <button id="presentBtn">Present Logo</button>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
