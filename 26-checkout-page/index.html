<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Page</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h2>BrownStore Checkout</h2>
</header>

<div class="container">

<div class="billing">

<h2>Billing Details</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="text" placeholder="Phone Number">

<input type="text" placeholder="Address">

<input type="text" placeholder="City">

<input type="text" placeholder="State">

<input type="text" placeholder="ZIP Code">

</div>

<div class="summary">

<h2>Order Summary</h2>

<div class="product">

<img src="https://picsum.photos/100/100?random=1">

<div>

<h3>Running Shoes</h3>

<p>₹2,799</p>

</div>

</div>

<div class="product">

<img src="https://picsum.photos/100/100?random=2">

<div>

<h3>Leather Backpack</h3>

<p>₹3,999</p>

</div>

</div>

<hr>

<p>Subtotal <span>₹6,798</span></p>

<p>Shipping <span>₹100</span></p>

<h3>Total <span>₹6,898</span></h3>

<button id="placeOrder">Place Order</button>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
